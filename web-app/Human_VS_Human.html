<!-- In HTML Comments are written like this -->
<!-- They can all be removed for your apps -->
<!doctype html> <!-- This first line tells browsers to expect modern standard html 5 -->
<html lang="en-gb"> <!-- This is indicates the page is written in British English, useful for accessibility -->
<meta charset="utf-8"> <!-- This indicates how the file is encoded. utf-8 is standard -->
<title>Battleship</title> <!-- All pages need a title, this will be displayed in the browser's title bar -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800;900&family=Chakra+Petch:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="Human_VS_Human.css"> <!-- Import style sheet -->
<link rel="icon" href="./assets/favicon.png"> <!-- Import 'Favorites Icon' – favicon.png -->
<script type="module" src="Human_VS_Human.js"></script> <!-- Load the main script. Must be type="module". Have only one of these -->

<header>
    <h1>
        <img src="./assets/battleship.png">
        Battleship
        <img src="./assets/battleship.png">
    </h1>
    <div id="game_rules">
        <div class="mechanic-card fire-card">
            <span class="mc-icon">🎯</span>
            <div class="mc-text">
                <span class="mc-title">Standard Fire</span>
                <span class="mc-desc">Attacks a single enemy tile</span>
            </div>
        </div>
        <div class="mechanic-card sonar-card">
            <span class="mc-icon">📡</span>
            <div class="mc-text">
                <span class="mc-title">Sonar Scan</span>
                <span class="mc-desc">Reveals ship count in 3×3 area</span>
            </div>
        </div>
        <div class="mechanic-card ghost-card">
            <span class="mc-icon">👻</span>
            <div class="mc-text">
                <span class="mc-title">Ghost Move</span>
                <span class="mc-desc">Shift an unsunk ship 1 tile</span>
            </div>
        </div>
    </div>
</header>

<aside>
    <h2>Player 1</h2>
    <div class = "game_board_container" id="game_container_1">
        <table id="game_board_1" index="0">
            
        </table>
    </div>
    <div class="ship_container">
        <table id="ships_1">
        </table>
    </div>
    <div id="button_container_1" class="button_container">
    </div>
    <div id="player_1_battle_window" class="player-battle-window"></div>
</aside>

<div id="center_control" class="center-control"></div>

<main>
    <h2>Player 2</h2>
    <div class = "game_board_container" id="game_container_2">
        <table id="game_board_2" index="0">
            
        </table>
    </div>
    <div class="ship_container">
        <table id="ships_2">
            
        </table>
    </div>
    <div id="button_container_2" class="button_container"></div>
    <div id="player_2_battle_window" class="player-battle-window"></div>
</main>

<div id="legend">
    <div class="label-table">
        <div class="legend-item">
            <div class="colour-box ship-label"></div>
            <div class="label">Ship</div>
          </div>
        <div class="legend-item">
          <div class="colour-box hit-label"></div>
          <div class="label">Hit</div>
        </div>
        <div class="legend-item">
          <div class="colour-box miss-label"></div>
          <div class="label">Miss</div>
        </div>
        <div class="legend-item">
          <div class="colour-box sunken-ship-label"></div>
          <div class="label">Sunken Ship</div>
        </div>
      </div>
      
    <button onClick="window.location.reload();">New Game</button>
</div>
