<!doctype html>
<html lang="en-gb">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Battleship — Command Interface</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800;900&family=Chakra+Petch:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="default.css">
</head>
<body>

<!-- ============ Cinematic naval battle background ============ -->
<div class="bg-cinematic" aria-hidden="true">
    <img src="./assets/background pic.png" alt="" class="bg-cinematic-img">
    <!-- Deep vignette to anchor the UI onto the scene -->
    <div class="bg-cinematic-vignette"></div>
</div>

<!-- ============ Atmospheric HUD layers ============ -->
<div class="bg-scan-line" aria-hidden="true"></div>

<!-- Floating ember particles (warm port-side sparks + cold starboard) -->
<div class="bg-embers" aria-hidden="true">
    <span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span>
</div>

<!-- ============ Top HUD readout ============ -->
<div class="hud-strip hud-top" role="banner">
    <span class="hud-tag">COMMAND INTERFACE · V.25.06</span>
    <span class="hud-tag">NAVAL BATTLE SYSTEM · <b class="hud-online">ONLINE</b></span>
</div>

<!-- ============ Main command interface ============ -->
<main class="menu">

    <!-- Title is baked into the cinematic background image.
         The h1 stays in the DOM for accessibility / SEO, but is visually hidden. -->
    <h1 class="sr-title">BATTLESHIP — Tactical Naval Warfare</h1>

    <nav class="mode-select" aria-label="Game mode selection">
        <a href="./Human_VS_BOT.html" id="singleplayer" class="mode-panel panel-p1">
            <img src="./assets/Single Player mode selection pic.png"
                 class="mode-img"
                 alt="Single Player — Fight an AI Opponent. Choose a difficulty and sink its fleet.">
            <span class="sweep-layer" aria-hidden="true"></span>
        </a>

        <a href="./Human_VS_Human.html" id="multiplayer" class="mode-panel panel-p2">
            <img src="./assets/2 Player mode selection pic.png"
                 class="mode-img"
                 alt="Two Players — Play Against a Friend. Two commanders, one device.">
            <span class="sweep-layer" aria-hidden="true"></span>
        </a>
    </nav>
</main>

<!-- ============ Bottom HUD readout ============ -->
<footer class="hud-strip hud-bottom" role="contentinfo">
    <span class="hud-tag">SYSTEM STATUS · ALL SYSTEMS NOMINAL</span>
    <span class="hud-motto">PREPARE YOUR FLEET · COMMAND THE OCEAN · <b>CLAIM VICTORY</b></span>
    <span class="hud-tag">TACTICAL GRID · READY</span>
</footer>

<!-- Flash overlay used by the mission-launch transition -->
<div class="launch-overlay" aria-hidden="true"></div>

<script>
    // Selecting a mode feels like launching a mission.
    // Links still work normally (keyboard / no-JS) for accessibility + routing.
    document.querySelectorAll(".mode-panel").forEach(function (panel) {
        panel.addEventListener("click", function (event) {
            if (event.metaKey || event.ctrlKey || event.shiftKey) {
                return;
            }
            event.preventDefault();
            const href = panel.getAttribute("href");
            document.body.classList.add("launching");
            document.body.classList.add(
                panel.classList.contains("panel-p1") ? "launch-p1" : "launch-p2"
            );
            panel.classList.add("is-launching");
            setTimeout(function () {
                window.location.href = href;
            }, 700);
        });
    });
</script>
</body>
</html>
